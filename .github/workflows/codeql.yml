name: PhoneControlHub-Final-Success-APK

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Tools & Dependencies
        run: |
          npm install -g typescript
          npm install --legacy-peer-deps
          npm install @capacitor/cli@latest @capacitor/android@latest @capacitor/core@latest typescript
          rm -rf android
          npx cap add android

      - name: Build Web & Sync
        run: |
          mkdir -p dist
          echo "<html><body>Phone Control Hub Build</body></html>" > dist/index.html
          npx cap sync android

      - name: Setup Java JDK 21
        # قمنا بتغيير الإصدار إلى 21 لحل خطأ "invalid source release"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneControlHub-Ready-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
