name: PhoneControlHub-Final-APK-Generator

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Rebuild Android Environment
        # هذا القسم يحل مشكلة "Project with path :capacitor-android could not be found"
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/cli@latest @capacitor/android@latest @capacitor/core@latest typescript
          rm -rf android
          npx cap add android

      - name: Prepare Web Assets
        run: |
          # بناء ملفات الويب المطلوبة لتشغيل التطبيق داخل الـ APK
          mkdir -p dist
          echo "<html><body>Phone Control Hub Build</body></html>" > dist/index.html
          npx cap sync android

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download Your APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneControlHub-Final-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
